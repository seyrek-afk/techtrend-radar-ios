name: TechTrendRadar
options:
  bundleIdPrefix: com.techtrend
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Release
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_PREVIEWS: "YES"

targets:
  TechTrendRadar:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TechTrendRadar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.techtrend.radar
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_STRICT_CONCURRENCY: complete
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
        # App Store submission settings
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""          # ← Apple Developer Team ID buraya
        INFOPLIST_FILE: TechTrendRadar/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          VALIDATE_PRODUCT: "YES"
    info:
      path: TechTrendRadar/Info.plist
      properties:
        CFBundleDisplayName: TechTrend Radar
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            trycloudflare.com:
              NSExceptionAllowsInsecureHTTPLoads: false
              NSIncludesSubdomains: true
        ITSAppUsesNonExemptEncryption: false
