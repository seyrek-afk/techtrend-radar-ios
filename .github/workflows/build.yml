name: iOS Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Archive
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode ortamını göster
        run: |
          xcodebuild -version
          echo "--- Xcode uygulamaları ---"
          ls /Applications/Xcode*.app 2>/dev/null || true
          echo "--- iOS simulator runtimes ---"
          xcrun simctl list runtimes 2>/dev/null | grep -i ios | head -10 || true

      - name: Install XcodeGen
        run: brew install xcodegen --quiet

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (iphonesimulator SDK)
        run: |
          set -eo pipefail
          xcodebuild build \
            -project TechTrendRadar.xcodeproj \
            -scheme TechTrendRadar \
            -sdk iphonesimulator \
            -configuration Debug \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            SWIFT_STRICT_CONCURRENCY=minimal \
            -derivedDataPath DerivedData \
            2>&1 | tee build.log | tail -120

      - name: Verify ve zip oluştur
        run: |
          APP=$(find DerivedData -name "TechTrendRadar.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "❌ .app bulunamadı — build logu:"
            tail -150 build.log
            exit 1
          fi
          echo "✅ App: $APP"
          ls -la "$APP"
          cd "$(dirname "$APP")"
          zip -r "$GITHUB_WORKSPACE/TechTrendRadar-simulator.zip" TechTrendRadar.app
          echo "=== Zip içeriği (ilk 15) ==="
          zipinfo "$GITHUB_WORKSPACE/TechTrendRadar-simulator.zip" | head -15

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TechTrendRadar-simulator-${{ github.sha }}
          path: TechTrendRadar-simulator.zip
          retention-days: 14

      - name: Upload to Appetize.io
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        env:
          APPETIZE_API_TOKEN: ${{ secrets.APPETIZE_API_TOKEN }}
          APPETIZE_PUBLIC_KEY: ${{ secrets.APPETIZE_PUBLIC_KEY }}
        run: |
          if [ -z "$APPETIZE_API_TOKEN" ]; then
            echo "⚠️  APPETIZE_API_TOKEN tanımlı değil, atlanıyor."
            exit 0
          fi
          if [ -n "$APPETIZE_PUBLIC_KEY" ]; then
            RESPONSE=$(curl -s -X POST \
              "https://api.appetize.io/v1/apps/$APPETIZE_PUBLIC_KEY" \
              -H "Authorization: Token $APPETIZE_API_TOKEN" \
              -F "file=@TechTrendRadar-simulator.zip" \
              -F "platform=ios")
          else
            RESPONSE=$(curl -s -X POST \
              "https://api.appetize.io/v1/apps" \
              -H "Authorization: Token $APPETIZE_API_TOKEN" \
              -F "file=@TechTrendRadar-simulator.zip" \
              -F "platform=ios")
          fi
          echo "Appetize yanıtı: $RESPONSE"
          KEY=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('publicKey',''))" 2>/dev/null || true)
          if [ -n "$KEY" ]; then
            echo "✅ https://appetize.io/app/$KEY"
            echo "## 📱 iOS Simülatör" >> $GITHUB_STEP_SUMMARY
            echo "[Tarayıcıda Aç](https://appetize.io/app/$KEY)" >> $GITHUB_STEP_SUMMARY
          fi
