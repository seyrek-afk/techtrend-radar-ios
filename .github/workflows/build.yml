name: iOS Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    name: Build & Archive
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project TechTrendRadar.xcodeproj -scheme TechTrendRadar

      - name: Build (simulator)
        run: |
          xcodebuild build \
            -project TechTrendRadar.xcodeproj \
            -scheme TechTrendRadar \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true

      - name: Create simulator .app archive
        run: |
          APP_PATH=$(find DerivedData -name "TechTrendRadar.app" -type d | head -1)
          echo "App path: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/TechTrendRadar.app
          zip -r TechTrendRadar.zip Payload
          mv TechTrendRadar.zip TechTrendRadar.ipa

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: TechTrendRadar-${{ github.sha }}
          path: TechTrendRadar.ipa
          retention-days: 14

      - name: Upload to Appetize.io
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        env:
          APPETIZE_API_TOKEN: ${{ secrets.APPETIZE_API_TOKEN }}
          APPETIZE_PUBLIC_KEY: ${{ secrets.APPETIZE_PUBLIC_KEY }}
        run: |
          if [ -z "$APPETIZE_API_TOKEN" ]; then
            echo "⚠️  APPETIZE_API_TOKEN secret tanımlı değil, upload atlanıyor."
            echo "Appetize.io kurulumu için README'ye bakın."
            exit 0
          fi

          if [ -n "$APPETIZE_PUBLIC_KEY" ]; then
            # Mevcut app'i güncelle
            echo "Appetize.io uygulaması güncelleniyor..."
            RESPONSE=$(curl -s -X POST \
              "https://api.appetize.io/v1/apps/$APPETIZE_PUBLIC_KEY" \
              -H "Authorization: Token $APPETIZE_API_TOKEN" \
              -F "file=@TechTrendRadar.ipa" \
              -F "platform=ios")
          else
            # Yeni app yükle
            echo "Appetize.io'ya yeni uygulama yükleniyor..."
            RESPONSE=$(curl -s -X POST \
              "https://api.appetize.io/v1/apps" \
              -H "Authorization: Token $APPETIZE_API_TOKEN" \
              -F "file=@TechTrendRadar.ipa" \
              -F "platform=ios")
          fi

          echo "Appetize yanıtı: $RESPONSE"
          PUBLIC_KEY=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('publicKey',''))" 2>/dev/null || echo "")

          if [ -n "$PUBLIC_KEY" ]; then
            echo "✅ Appetize URL: https://appetize.io/app/$PUBLIC_KEY"
            echo "APPETIZE_URL=https://appetize.io/app/$PUBLIC_KEY" >> $GITHUB_STEP_SUMMARY
            echo "## 📱 iOS Simülatör" >> $GITHUB_STEP_SUMMARY
            echo "[Tarayıcıda Aç](https://appetize.io/app/$PUBLIC_KEY)" >> $GITHUB_STEP_SUMMARY
          fi
