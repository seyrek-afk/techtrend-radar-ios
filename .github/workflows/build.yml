name: iOS Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    name: Build & Archive
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project TechTrendRadar.xcodeproj -scheme TechTrendRadar

      - name: Show available simulators
        run: xcodebuild -showdestinations -scheme TechTrendRadar -project TechTrendRadar.xcodeproj 2>&1 | grep "iOS Simulator" | head -10 || true

      - name: Build (simulator)
        run: |
          set -eo pipefail
          xcodebuild build \
            -project TechTrendRadar.xcodeproj \
            -scheme TechTrendRadar \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            ONLY_ACTIVE_ARCH=YES \
            ENABLE_ON_DEMAND_RESOURCES=NO \
            ACTOOL_COMPRESS_PNGS=NO \
            2>&1 | tee build.log | tail -80

      - name: Verify build output
        run: |
          echo "=== DerivedData/Build/Products içeriği ==="
          find DerivedData/Build/Products -maxdepth 3 | head -40
          APP_PATH=$(find DerivedData -name "TechTrendRadar.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ .app bulunamadı! Build logu:"
            tail -100 build.log
            exit 1
          fi
          echo "✅ App path: $APP_PATH"
          echo "=== App içeriği ==="
          ls -la "$APP_PATH"

      - name: Create simulator zip (Appetize format)
        run: |
          set -eo pipefail
          APP_PATH=$(find DerivedData -name "TechTrendRadar.app" -type d | head -1)
          # Appetize simulator format: .app doğrudan zip kökünde, Payload/ sarmalı olmadan
          cd "$(dirname "$APP_PATH")"
          zip -r "$GITHUB_WORKSPACE/TechTrendRadar.zip" TechTrendRadar.app
          echo "=== Zip içeriği (ilk 20 satır) ==="
          zipinfo "$GITHUB_WORKSPACE/TechTrendRadar.zip" | head -20

      - name: Upload simulator zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: TechTrendRadar-simulator-${{ github.sha }}
          path: TechTrendRadar.zip
          retention-days: 14

      - name: Upload to Appetize.io
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        env:
          APPETIZE_API_TOKEN: ${{ secrets.APPETIZE_API_TOKEN }}
          APPETIZE_PUBLIC_KEY: ${{ secrets.APPETIZE_PUBLIC_KEY }}
        run: |
          if [ -z "$APPETIZE_API_TOKEN" ]; then
            echo "⚠️  APPETIZE_API_TOKEN secret tanımlı değil, upload atlanıyor."
            exit 0
          fi

          if [ -n "$APPETIZE_PUBLIC_KEY" ]; then
            echo "Appetize.io uygulaması güncelleniyor..."
            RESPONSE=$(curl -s -X POST \
              "https://api.appetize.io/v1/apps/$APPETIZE_PUBLIC_KEY" \
              -H "Authorization: Token $APPETIZE_API_TOKEN" \
              -F "file=@TechTrendRadar.zip" \
              -F "platform=ios")
          else
            echo "Appetize.io'ya yeni uygulama yükleniyor..."
            RESPONSE=$(curl -s -X POST \
              "https://api.appetize.io/v1/apps" \
              -H "Authorization: Token $APPETIZE_API_TOKEN" \
              -F "file=@TechTrendRadar.zip" \
              -F "platform=ios")
          fi

          echo "Appetize yanıtı: $RESPONSE"
          PUBLIC_KEY=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('publicKey',''))" 2>/dev/null || echo "")

          if [ -n "$PUBLIC_KEY" ]; then
            echo "✅ Appetize URL: https://appetize.io/app/$PUBLIC_KEY"
            echo "## 📱 iOS Simülatör" >> $GITHUB_STEP_SUMMARY
            echo "[Tarayıcıda Aç](https://appetize.io/app/$PUBLIC_KEY)" >> $GITHUB_STEP_SUMMARY
          fi
